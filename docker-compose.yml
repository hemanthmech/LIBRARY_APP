version: "3.9"

services:

  # ── PostgreSQL database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-libratrack}
      POSTGRES_USER: ${POSTGRES_USER:-libratrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-libratrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django application ───────────────────────────────────────────────────────
  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-libratrack}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-libratrack}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "${APP_PORT:-8000}:8000"

  # ── Nginx reverse proxy (serves static files, proxies to Gunicorn) ───────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro

volumes:
  postgres_data:
  static_files:
  media_files:
