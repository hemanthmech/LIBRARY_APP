{% extends "base.html" %}
{% block title %}Delete Book — LibraTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white">
        <h1 class="h4 mb-0"><i class="bi bi-exclamation-triangle me-2" aria-hidden="true"></i>Confirm Deletion</h1>
      </div>
      <div class="card-body">
        <p class="lead">Are you sure you want to delete <strong>"{{ object.title }}"</strong>?</p>
        <p class="text-muted">This action cannot be undone. All associated borrow records will also be deleted.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">
              <i class="bi bi-trash me-1" aria-hidden="true"></i>Yes, Delete
            </button>
            <a href="{{ object.get_absolute_url }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
