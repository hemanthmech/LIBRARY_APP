{% extends "base.html" %}
{% block title %}Delete Category — LibraTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white">
        <h1 class="h4 mb-0">Confirm Deletion</h1>
      </div>
      <div class="card-body">
        <p class="lead">Delete category <strong>"{{ object.name }}"</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Delete</button>
            <a href="{{ object.get_absolute_url }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
