{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Borrow "{{ book.title }}" — LibraTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white">
        <h1 class="h4 mb-0">
          <i class="bi bi-bookmark-plus me-2" aria-hidden="true"></i>Borrow Book
        </h1>
      </div>
      <div class="card-body p-4">
        <p class="lead mb-4">
          You are borrowing: <strong>{{ book.title }}</strong>
        </p>
        {% crispy form %}
        <a href="{{ book.get_absolute_url }}" class="btn btn-link mt-2">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
